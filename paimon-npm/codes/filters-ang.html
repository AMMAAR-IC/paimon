<!DOCTYPE html> 
<html ng-app=""> 
    <head> 
        <title>Filters In Angular</title> 
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script> 
    </head> 

    <body> 
        My name: 
        <input type="text" ng-model="name"> 
        <br></br> 
        Upper case name: {{name | uppercase}} 
        <br></br> 
        Lower case name: {{name | lowercase}} 
        <br></br> 
        Currency:{{1000 | currency}} 
        <br></br> 
        Date:{{1000000000000 | date}} 
        <br></br> 
    </body> 
</html>
